<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" fill="#0a0a0a" rx="80"/>

  <!-- Location pin -->
  <g transform="translate(256, 210)">
    <!-- Pin shape -->
    <path d="M0,-100 C55,-100 100,-55 100,0 C100,55 0,130 0,130 C0,130 -100,55 -100,0 C-100,-55 -55,-100 0,-100 Z"
          fill="none" stroke="white" stroke-width="18"/>
    <!-- Car icon inside pin -->
    <g transform="translate(-34, -20)">
      <!-- Car body -->
      <rect x="4" y="20" width="60" height="28" rx="6" fill="white"/>
      <!-- Car roof -->
      <path d="M14,20 L20,4 L48,4 L54,20 Z" fill="white"/>
      <!-- Left wheel -->
      <circle cx="16" cy="48" r="8" fill="#0a0a0a" stroke="white" stroke-width="4"/>
      <!-- Right wheel -->
      <circle cx="52" cy="48" r="8" fill="#0a0a0a" stroke="white" stroke-width="4"/>
      <!-- Windshield -->
      <path d="M22,20 L26,8 L42,8 L46,20 Z" fill="#0a0a0a"/>
    </g>
  </g>

  <!-- Text: Same Day -->
  <text x="256" y="358" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-1">Same Day</text>
  <!-- Text: Car Repair. -->
  <text x="256" y="416" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-1">Car Repair.</text>
</svg>
